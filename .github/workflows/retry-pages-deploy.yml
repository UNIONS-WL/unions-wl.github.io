name: Retry failed Pages deploy

on:
  workflow_run:
    workflows:
      - pages build and deployment
    types:
      - completed

permissions:
  actions: write
  contents: read

jobs:
  retry-deploy:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - name: Check failing job
        id: failing-job
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          failed_job_name="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${{ github.event.workflow_run.id }}/jobs" --jq '.jobs[] | select(.conclusion == "failure") | .name' | head -n 1)"
          if [ "${failed_job_name}" = "deploy" ]; then
            echo "should_retry=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_retry=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-run failed jobs
        if: steps.failing-job.outputs.should_retry == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${{ github.event.workflow_run.id }}/rerun-failed-jobs"
